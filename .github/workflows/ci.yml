name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Lint
        run: ruff check .

  test:
    name: Run Test Suite
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: orqflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Database Migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@localhost:5432/orqflow
          REDIS_URL: redis://localhost:6379/0
          ACCESS_TOKEN_SECRET: ci-test-secret-key-12345678901234567890
          REFRESH_TOKEN_SECRET: ci-refresh-secret-key-12345678901234567890
          MCP_SERVER_KEY: ci-test-mcp-key
          SEARCH_PROVIDER: mock
          CLIENT_URL: http://localhost:5173
        run: |
          alembic upgrade head

      - name: Run Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@localhost:5432/orqflow
          REDIS_URL: redis://localhost:6379/0
          ACCESS_TOKEN_SECRET: ci-test-secret-key-12345678901234567890
          REFRESH_TOKEN_SECRET: ci-refresh-secret-key-12345678901234567890
          MCP_SERVER_KEY: ci-test-mcp-key
          SEARCH_PROVIDER: mock
          CLIENT_URL: http://localhost:5173
        run: |
          pytest tests/ -v

  build:
    name: Docker Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: orqflow:latest
