# .github/workflows/keep-alive.yml
#
# Prevents Render free-tier cold starts by pinging the health endpoint
# every 10 minutes. (§17.5.6 — learned from ShopSense deployment)
#
# Setup: add API_URL as a GitHub Actions secret in your repo settings.
# Value: your deployed API URL, e.g. https://orqflow.onrender.com
#
# The curl uses --max-time 60 to give the server time to wake up if it
# was already spinning down when the ping arrived.

name: Keep Alive

on:
  schedule:
    - cron: "*/8 * * * *"   # every 10 minutes
  workflow_dispatch: {}       # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging ${{ secrets.API_URL }}/api/health"
          curl -fsSL \
            --max-time 60 \
            --verbose \
            "${{ secrets.API_URL }}/api/health" \
            || echo "⚠️ Ping failed — server may be cold-starting. This is expected occasionally."
